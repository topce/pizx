<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="640" fill="#0D1117"/>
  
  <!-- Decorative grid -->
  <g opacity="0.05">
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#58A6FF"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#58A6FF"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#58A6FF"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#58A6FF"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#58A6FF"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#58A6FF"/>
  </g>

  <!-- Title -->
  <text x="640" y="200" font-family="JetBrains Mono, SF Mono, monospace" font-size="96" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">
    pizx
  </text>
  
  <!-- Subtitle -->
  <text x="640" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#8B949E" text-anchor="middle" letter-spacing="2">
    zx fork · 15 AI template tags
  </text>

  <!-- Tagline -->
  <text x="640" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#58A6FF" text-anchor="middle" font-weight="500">
    Shell scripting supercharged with native Pi AI
  </text>

  <!-- Greek Letters Bar -->
  <g transform="translate(640, 420)">
    <text x="-420" y="0" font-family="JetBrains Mono, monospace" font-size="36" fill="#7EE787" text-anchor="middle">π</text>
    <text x="-300" y="0" font-family="JetBrains Mono, monospace" font-size="36" fill="#D2A8FF" text-anchor="middle">Π</text>
    <text x="-180" y="0" font-family="JetBrains Mono, monospace" font-size="36" fill="#FFA657" text-anchor="middle">Ρ</text>
    <text x="-60"  y="0" font-family="JetBrains Mono, monospace" font-size="36" fill="#79C0FF" text-anchor="middle">Φ</text>
    <text x="60"   y="0" font-family="JetBrains Mono, monospace" font-size="36" fill="#FF7B72" text-anchor="middle">Σ</text>
    <text x="180"  y="0" font-family="JetBrains Mono, monospace" font-size="36" fill="#7EE787" text-anchor="middle">Δ</text>
    <text x="300"  y="0" font-family="JetBrains Mono, monospace" font-size="36" fill="#D2A8FF" text-anchor="middle">Λ</text>
    <text x="420"  y="0" font-family="JetBrains Mono, monospace" font-size="36" fill="#FFA657" text-anchor="middle">Ω</text>
  </g>

  <!-- Labels below Greek letters -->
  <g transform="translate(640, 480)">
    <text x="-420" y="0" font-family="system-ui, sans-serif" font-size="12" fill="#8B949E" text-anchor="middle">PI</text>
    <text x="-300" y="0" font-family="system-ui, sans-serif" font-size="12" fill="#8B949E" text-anchor="middle">CAP PI</text>
    <text x="-180" y="0" font-family="system-ui, sans-serif" font-size="12" fill="#8B949E" text-anchor="middle">RALPH</text>
    <text x="-60"  y="0" font-family="system-ui, sans-serif" font-size="12" fill="#8B949E" text-anchor="middle">FLEET</text>
    <text x="60"   y="0" font-family="system-ui, sans-serif" font-size="12" fill="#8B949E" text-anchor="middle">SUB</text>
    <text x="180"  y="0" font-family="system-ui, sans-serif" font-size="12" fill="#8B949E" text-anchor="middle">DEBATE</text>
    <text x="300"  y="0" font-family="system-ui, sans-serif" font-size="12" fill="#8B949E" text-anchor="middle">PIPE</text>
    <text x="420"  y="0" font-family="system-ui, sans-serif" font-size="12" fill="#8B949E" text-anchor="middle">ORCH</text>
  </g>

  <!-- CTA -->
  <g transform="translate(640, 570)">
    <rect x="-200" y="-25" width="400" height="50" rx="8" fill="#238636"/>
    <text x="0" y="5" font-family="JetBrains Mono, monospace" font-size="18" fill="#FFFFFF" text-anchor="middle" font-weight="bold">
      npm install @topce/pizx
    </text>
  </g>

  <!-- subtle logo watermark -->
  <text x="50" y="610" font-family="JetBrains Mono, monospace" font-size="14" fill="#30363D" text-anchor="start">
    @topce/pizx  ·  MIT
  </text>
</svg>
